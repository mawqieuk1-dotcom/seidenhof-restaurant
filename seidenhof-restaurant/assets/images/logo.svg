<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <style>
      .logo-text { font-family: 'Georgia', serif; font-size: 22px; font-weight: bold; fill: #1a1a1a; letter-spacing: 4px; }
      .logo-dot { fill: #c9a96e; }
      .logo-accent { fill: #c9a96e; }
    </style>
  </defs>
  <!-- نقطة ذهبية -->
  <circle cx="15" cy="25" r="4" class="logo-dot"/>
  <!-- نص الشعار -->
  <text x="30" y="32" class="logo-text">Seiden<tspan class="logo-accent">hof</tspan></text>
  <!-- خط سفلي رفيع -->
  <line x1="30" y1="40" x2="160" y2="40" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
</svg>